<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Gatebound - Web Build</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #loading {
        color: white;
        font-family: sans-serif;
        font-size: 1.5rem;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading Game...</div>
    <script type="module">
      import init from './gatebound_app.js';
      
      init().then(() => {
        document.getElementById('loading').style.display = 'none';
      }).catch((error) => {
        console.error("Failed to start the game:", error);
        if (!error.message || !error.message.startsWith("Using exceptions for control flow")) {
          document.getElementById('loading').innerText = "Error loading game. Check console.";
        }
      });
    </script>
  </body>
</html>
